<!DOCTYPE html>
<html>
<head>
  <title>Flight Booking</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    body {
      background: linear-gradient(to right, #e3f2fd, #ffffff);
      font-family: 'Segoe UI', sans-serif;
    }

    .header {
      background: #0a2239;
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 20px;
    }

    .search-box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
    }

    .flight-card {
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 10px;
      background: #ffffff;
      box-shadow: 0px 3px 10px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .flight-card:hover {
      transform: scale(1.02);
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: #007bff;
    }

    .select-btn {
      float: right;
    }

    .booking-card {
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="container mt-4">

  <!-- HEADER -->
  <div class="header">
    <h2>✈️ Flight Booking System</h2>
    <p>Find the best routes instantly</p>
  </div>

  <!-- SEARCH -->
  <div class="search-box mb-4">
    <div class="form-row">
      <input id="from" class="form-control col mr-2" placeholder="From (HYD)">
      <input id="to" class="form-control col mr-2" placeholder="To (DEL)">
      
      <select id="mode" class="form-control col mr-2">
        <option value="fastest">Fastest</option>
        <option value="cheapest">Cheapest</option>
      </select>

      <button class="btn btn-primary col" onclick="searchFlights()">Search</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="result"></div>

  <!-- SELECTED -->
  <div id="selectedFlight" class="mt-3"></div>

  <!-- BOOKING -->
  <div id="bookingSection" class="booking-card mt-4" style="display:none;">
    <h5>🎟️ Book Ticket</h5>
    <input id="name" class="form-control mb-2" placeholder="Your Name">
    <input id="email" class="form-control mb-2" placeholder="Your Email">
    <button class="btn btn-success" onclick="bookTicket()">Confirm Booking</button>
  </div>

  <!-- RESULT -->
  <div id="bookingResult" class="mt-3"></div>

  <!-- HISTORY -->
  <div class="booking-card mt-4">
    <h4>📜 Booking History</h4>
    <button class="btn btn-info mb-3" onclick="loadBookings()">Load Bookings</button>
    <div id="bookingList"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
